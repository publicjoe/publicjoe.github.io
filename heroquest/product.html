<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>Publicjoe's Webspace</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="../index.html">PublicJoe's</a>
      </div>
      <div id="navigation"></div>
    </header>

    <main id="main">
      <div class="container">
        <div class="card">
          <img
            src="../images/purchases/heroquest/logo_heroquest.png"
            alt="HeroQuest"
            style="
              display: block;
              margin: 20px auto;
              max-width: 450px;
              width: 100%;
            "
          />

          <div id="product"></div>
        </div>
      </div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#navigation").load("../nav.html", function () {
          initializeMobileMenu();
        });
      });
    </script>
    <script src="../script.js"></script>
    <script src="heroquest/product.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const params = new URLSearchParams(window.location.search);
        const product = params.get("product") || "heroquest";
        loadProduct(`heroquest/${product}.json`);
      });
    </script>
  </body>
</html>
