<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>Publicjoe's Webspace</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="../index.html">PublicJoe's</a>
      </div>
      <div id="navigation"></div>
    </header>

    <main id="main">
      <div class="container">
        <div class="card">
          <img
            src="../images/purchases/heroquest/logo_heroquest.png"
            alt="HeroQuest"
            style="
              display: block;
              margin: 20px auto;
              max-width: 450px;
              width: 100%;
            "
          />
          <h1>HeroQuest</h1>
          <p>
            HeroQuest is a fantasy board game for 2-5 players. Set in the world
            of Zargon, players take on the roles of heroes exploring dungeons
            and fighting monsters.
          </p>
          <p>Useful details from the expansions:</p>
          <ul>
            <li><a href="heroquest/heroes.html">Heroes</a></li>
            <li><a href="heroquest/monsters.html">Monsters</a></li>
            <li><a href="heroquest/quest-order.html">Quest Order</a></li>
          </ul>
        </div>
      </div>
    </main>

    <!-- Load jQuery first -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <!-- Then load navigation -->
    <script>
      $(document).ready(function () {
        $("#navigation").load("../nav.html", function () {
          // Navigation is now loaded, so initialize mobile menu functionality only
          initializeMobileMenu();
        });
      });
    </script>
    <!-- Then your main script (now much simpler) -->
    <script src="../script.js"></script>
  </body>
</html>
