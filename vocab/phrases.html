<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Learning Russian Notes</title>
    <link rel="stylesheet" type="text/css" href="../css/style.css" />
    <link rel="stylesheet" type="text/css" href="../css/menu-style.css" />

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <script>
        $(document).ready(function () {
            $("#navigation").load("../menu/nav-vocab.html");
        });
    </script>

    <script>
        var currentPlayer;
        function EvalSound(soundobj) {

            var thissound = document.getElementById(soundobj);
            if (currentPlayer && currentPlayer != thissound) {
                currentPlayer.pause();
            }
            if (thissound.paused)
                thissound.play();
            else
                thissound.pause();
            thissound.currentTime = 0;
            currentPlayer = thissound;
        }
    </script>
</head>

<body>
    <div id="container">
        <div id="head">
            <div id="head-l">
                <h1>Learning Russian Notes</h1>
            </div>
            <div id="head-r">
                <a href="../index.html">Home</a> - <a href="../grammar/index.html">Grammar</a> - <a
                    href="../situations/index.html">Situations</a> - <a href="../vocab/index.html">Vocabulary</a>
            </div>
        </div>

        <div id="navigation"></div>

        <div id="content">
            <h1>Simple phrases</h1>
            <p>
                <table width=100%>
                    <tr>
                        <td width=10% align=center>
                            <input type="button" value="PLAY" onclick="EvalSound('da'); return true;">
                            <audio id="все_хорошо"
                                src="../sounds/polite/все_хорошо.mp3"></audio>
                        </td>
                        <td width=90%>
                            <p><b>Всё хорошо́?</b> (vse ha-ra-shó?)</p>
                            <p>Is everything okay?</p>3
                        </td>
                    </tr>
                    <tr>
                        <td width=10% align=center>
                            <input type="button" value="PLAY" onclick="EvalSound('da'); return true;">
                            <audio id="не_надо"
                                src="../sounds/polite/не_надо.mp3"></audio>
                        </td>
                        <td width=90%>
                            <p><b>Не на́до!</b> (ni-e nа́-da)</p>
                            <p>Don't!</p>
                        </td>
                    </tr>
                </table>
            </p>
       </div>
    </div>
</body>

</html>
