<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>Publicjoe's Webspace</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="../index.html">PublicJoe's</a>
      </div>
      <div id="navigation"></div>
    </header>

    <main id="main">
      <div class="container">
        <div class="card">
          <h1>Painting/Building Diary 2026</h1>
          <div id="summary"></div>
          <div id="painted-models-summary"></div>
        </div>
        <div class="card">
          <div id="progress"></div>
        </div>
      </div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#navigation").load("../nav.html", function () {
          // Navigation is now loaded, so initialize mobile menu functionality only
          initializeMobileMenu();
        });
      });
    </script>

    <script src="../script.js"></script>
    <script>
      document.addEventListener(
        "DOMContentLoaded",
        loadPaintDiary("paint/2026.json"),
      );
    </script>
  </body>
</html>
