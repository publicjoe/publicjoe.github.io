<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/">
    <title>Publicjoe's Webspace</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="../index.html">PublicJoe's</a>
      </div>
      <div id="navigation"></div>
    </header>

    <main id="main">
    <div class="container">
      <h1>Painting Diary</h1>

      <div class="card">
        <h2><a href="paint/index.html?year=2026" id="2026">2026</a></h2>
        <div class="summary" year="2026"></div>
      </div>

      <div class="card">
        <h2><a href="paint/index.html?year=2025" id="2025">2025</a></h2>
        <div class="summary" year="2025"></div>
      </div>

      <div class="card">
        <h2><a href="paint/index.html?year=2024" id="2024">2024</a></h2>
        <div class="summary" year="2024"></div>
      </div>

      <div class="card">
        <h2><a href="paint/index.html?year=2023" id="2023">2023</a></h2>
        <div class="summary" year="2023"></div>
      </div>

      <div class="card">
        <h2><a href="paint/index.html?year=2022" id="2022">2022</a></h2>
        <div class="summary" year="2022"></div>
      </div>

      <div class="card">
        <h2><a href="paint/index.html?year=2021" id="2021">2021</a></h2>
        <p><b>Large Models/Vehicles Finished:</b> 6</p>
        <p><b>Models Finished:</b> 48</p>
      </div>

      <div class="card">
        <h2><a href="paint/index.html?year=2020" id="2020">2020</a></h2>
        <p><b>Large Models/Vehicles Finished:</b> 3</p>
        <p><b>Terrain Finished:</b> 5</p>
        <p><b>Models Finished:</b> 27</p>
    </div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#navigation").load("../nav.html", function() {
          initializeMobileMenu();
        });
      });
    </script>
    <script src="../script.js"></script>
    <script src="paint/paint.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const elements = document.querySelectorAll(".summary");

        elements.forEach((element) => {
          const year = element.getAttribute("year");
          loadSummaryIndex(`paint/${year}.json`, element);
        });
      });
    </script>
  </body>
</html>
