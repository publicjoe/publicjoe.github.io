<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/" />
    <title>Publicjoe's Webspace</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">
        <a href="../index.html">PublicJoe's</a>
      </div>
      <div id="navigation"></div>
    </header>

    <main id="main">
      <div class="container">
        <h1>Purchase Diary</h1>

        <div class="purchases" year="2026"></div>
        <div class="purchases" year="2025"></div>
        <div class="purchases" year="2024"></div>
        <div class="purchases" year="2023"></div>
        <div class="purchases" year="2022"></div>
        <div class="purchases" year="2021"></div>
        <div class="purchases" year="2020"></div>
        <div class="purchases" year="2019"></div>
        <div class="purchases" year="2018"></div>
        <div class="purchases" year="2017"></div>
      </div>
    </main>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.0/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#navigation").load("../nav.html", function () {
          initializeMobileMenu();
        });
      });
    </script>
    <script src="../script.js"></script>
    <script src="purchases/purchases.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const elements = document.querySelectorAll(".purchases");

        elements.forEach((element) => {
          const year = element.getAttribute("year");
          loadPurchases(`purchases/${year}.json`, element);
        });
      });
    </script>
  </body>
</html>
